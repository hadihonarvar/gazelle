# Policy for the file_janitor demo.
#
# Demonstrates four of the five Gazelle verdicts:
#   ALLOW   — read-only tools
#   DENY    — writes outside the workspace, or matching dangerous patterns
#   DRY_RUN — writes inside the workspace get a preview first
#
# (APPROVE_REQUIRED is exercised separately; needs the resume flow.)

version: 1
defaults:
  on_missing_shadow: allow
  on_no_match: deny

predicates:
  read_only:
    declared.scope.contains_any: ["filesystem:read"]

  is_writing:
    declared.scope.contains_any: ["filesystem:write"]

rules:
  # 1. Hard block: never delete from filesystem root.
  - id: shell-rm-rf-root
    description: "rm -rf / is never allowed"
    priority: 100
    match:
      tool: shell
      args.cmd.matches: '^\s*rm\s+(-[rRf]+\s+)+/(\s|$)'
    decision: deny
    reason: "rm -rf / is hard-blocked by policy"

  # 2. Hard block: writes to truly system-owned paths.
  - id: write-system-paths
    description: "Writes to system-owned paths are forbidden"
    priority: 90
    match:
      tool: write_file
      args.path.matches: '^/(etc|System|Library/(?!Caches)|root)(/|$)'
    decision: deny
    reason: "Writes to system paths are not allowed"

  - id: delete-system-paths
    priority: 90
    match:
      tool: delete_file
      args.path.matches: '^/(etc|System|Library/(?!Caches)|root)(/|$)'
    decision: deny
    reason: "Deletes from system paths are not allowed"

  # 3. Read-only operations: allow.
  - id: read-only-allow
    priority: 50
    match: read_only
    decision: allow

  # 4. write_file inside the workspace: dry-run first.
  - id: write-dry-run
    priority: 40
    match:
      tool: write_file
    decision: dry_run
    reason: "Preview the write before any real change"

  # 5. delete_file inside the workspace: allow (since path-escape was already denied above).
  - id: delete-inside-allow
    priority: 30
    match:
      tool: delete_file
    decision: allow

  # 6. shell inside workspace: allow.
  - id: shell-allow
    priority: 20
    match:
      tool: shell
    decision: allow
